padding:0;

body{
height:100vh;
background:#0f2027;

color:white;

/* خلفية الشارت */

left:0;

/* الكارد */
.container{
text-align:center;
background:rgba(0,0,0,0.6);
padding:40px;
border-radius:20px;

/* اللوجو */
.logo{
width:120px;
border-radius:50%;
margin-bottom:15px;
animation:float 4s ease-in-out infinite;

@keyframes float{
0%{transform:translateY(0px)}
50%{transform:translateY(-10px)}

h1{

justify-content:center;

}

.social a{
color:white;
font-size:26px;
transition:.3s;
}

.social a:hover{
color:#00ff9d;
transform:scale(1.2);
}

/* الأزرار */
.links{
display:flex;
flex-direction:column;
gap:15px;
}

.btn{
padding:15px;
border-radius:12px;
text-decoration:none;
color:white;
background:#1e3c4f;
font-weight:bold;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 0 15px #00ff9d,0 0 30px #00ff9d;
background:#00ff9d;
color:black;
}

footer{
margin-top:20px;
font-size:12px;
opacity:.6;
}

<body>

<script>

/* الشارت المتحرك */

const canvas = document.getElementById("chart");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let points=[];

for(let i=0;i<60;i++){
points.push(Math.random()*canvas.height)
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.beginPath();
ctx.strokeStyle="#00ff9d";
ctx.lineWidth=2;

let step=canvas.width/points.length;

for(let i=0;i<points.length;i++){

points[i]+=Math.random()*10-5;

if(points[i]<0)points[i]=0;
if(points[i]>canvas.height)points[i]=canvas.height;

ctx.lineTo(i*step,points[i])

}

ctx.stroke()

requestAnimationFrame(animate)

}

animate()

</script>
